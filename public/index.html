<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工作通 — BOSS Chat Assistant</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>

    <header class="topbar">
      <div class="topbar-left">
        <h1>工作通</h1>
        <p id="health">连接中</p>
      </div>
      <div class="topbar-actions">
        <button id="refresh" class="btn btn-secondary">刷新</button>
        <button id="save-settings" class="btn btn-secondary">保存设置</button>
      </div>
    </header>

    <main class="layout">

      <!-- ══════ 自动投递 ══════ -->
      <section class="panel">
        <div class="panel-header">
          <h2>自动投递</h2>
          <span id="pw-task-status" style="font-size:12px;color:var(--text-secondary)">空闲</span>
        </div>

        <div class="automation-stats">
          <div class="stat-item" style="cursor:default">
            <div class="stat-value" id="pw-browser-status-text">−</div>
            <div class="stat-label">浏览器</div>
          </div>
          <div class="stat-item accent">
            <div class="stat-value" id="pw-stat-sent">0</div>
            <div class="stat-label">已发送</div>
          </div>
          <div class="stat-item warning">
            <div class="stat-value" id="pw-stat-skipped">0</div>
            <div class="stat-label">已跳过</div>
          </div>
          <div class="stat-item danger">
            <div class="stat-value" id="pw-stat-errors">0</div>
            <div class="stat-label">错误</div>
          </div>
          <div class="stat-item" style="cursor:default">
            <div class="stat-value" id="pw-stat-total">0/0</div>
            <div class="stat-label">进度</div>
          </div>
          <div class="stat-item" style="cursor:default">
            <div class="stat-value" style="font-size:16px" id="pw-status-text">就绪</div>
            <div class="stat-label">状态</div>
          </div>
        </div>

        <div id="pw-progress" class="progress-bar-wrap" style="display:none">
          <div class="progress-bar">
            <div id="pw-progress-fill" class="progress-fill"></div>
          </div>
          <div class="progress-status" id="pw-status-text-bar">就绪</div>
        </div>

        <div class="automation-controls">
          <div class="mode-selector">
            <label class="mode-option"><input type="radio" name="pw-mode" value="recommend" />推荐</label>
            <label class="mode-option"><input type="radio" name="pw-mode" value="expected" checked />岗位推荐</label>
            <label class="mode-option"><input type="radio" name="pw-mode" value="search" />搜索</label>
          </div>
          <input id="pw-search-keyword" class="search-input" type="text" placeholder="输入搜索关键词" style="display:none" />
          <span class="control-spacer"></span>
          <button id="pw-launch"    class="btn btn-outline btn-lg">启动浏览器</button>
          <button id="pw-start"     class="btn btn-primary  btn-xl">开始投递</button>
          <button id="pw-stop"      class="btn btn-outline btn-lg">停止</button>
          <button id="pw-close-browser" class="btn btn-outline btn-lg">关闭浏览器</button>
        </div>

        <div id="pw-message" class="progress-hint">点击「启动浏览器」后在 BOSS 页面登录，再点击「开始投递」。</div>
      </section>

      <!-- ══════ 设置 + 简历 ══════ -->
      <div class="columns-2">

        <!-- 设置 -->
        <section class="panel">
          <div class="panel-header"><h2>自动化设置</h2></div>
          <div class="panel-body">
            <div class="form-grid cols2">
              <div class="form-group"><label class="form-label">DeepSeek URL</label><input id="api_base_url" class="form-input" type="url" /></div>
              <div class="form-group"><label class="form-label">模型</label>
                <select id="model" class="form-select">
                  <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                  <option value="deepseek-v4-pro">deepseek-v4-pro</option>
                  <option value="deepseek-chat">deepseek-chat</option>
                </select>
              </div>
              <div class="form-group"><label class="form-label">每日开聊上限</label><input id="daily_chat_limit" class="form-input" type="number" min="1" max="500" /></div>
              <div class="form-group"><label class="form-label">开聊分数线</label><input id="min_score_to_chat" class="form-input" type="number" min="0" max="100" /></div>
              <div class="form-group"><label class="form-label">最小间隔(ms)</label><input id="cooldown_min_ms" class="form-input" type="number" min="3000" step="1000" /></div>
              <div class="form-group"><label class="form-label">最大间隔(ms)</label><input id="cooldown_max_ms" class="form-input" type="number" min="5000" step="1000" /></div>
              <div class="form-group"><label class="form-label">期望薪资</label><input id="salary_expectation" class="form-input" type="text" /></div>
              <div class="form-group"><label class="form-label">投递城市</label><input id="target_city" class="form-input" type="text" placeholder="重庆" /></div>
              <div class="form-group"><label class="form-label">岗位关键词</label><input id="target_job_keyword" class="form-input" type="text" placeholder="产品经理" /></div>
              <div class="form-group form-wide"><label class="form-label">目标城市(多选)</label><input id="target_cities" class="form-input" type="text" /></div>
              <div class="form-group form-wide"><label class="form-label">目标岗位</label><input id="target_roles" class="form-input" type="text" /></div>
              <div class="form-group form-wide"><label class="form-label">偏好关键词</label><input id="preferred_keywords" class="form-input" type="text" /></div>
              <div class="form-group form-wide"><label class="form-label">屏蔽关键词</label><input id="blocked_keywords" class="form-input" type="text" /></div>
            </div>
            <div class="toggle-row">
              <label class="toggle-item"><input id="auto_send_initial" type="checkbox" /> 自动发送首句</label>
              <label class="toggle-item"><input id="auto_reply" type="checkbox" /> 自动回复</label>
              <label class="toggle-item"><input id="stop_on_risk_prompt" type="checkbox" /> 遇验证停止</label>
              <label class="toggle-item"><input id="allow_contact_info_in_messages" type="checkbox" /> 允许联系方式</label>
            </div>
          </div>
        </section>

        <!-- 简历 -->
        <section class="panel">
          <div class="panel-header"><h2>简历</h2></div>
          <div class="panel-body sm">
            <form id="upload-form" class="upload-row">
              <input id="resume-file" type="file" accept=".txt,.md,.pdf,.docx" />
              <button type="submit" class="btn btn-primary">上传分析</button>
            </form>
            <textarea id="resume-text" class="form-input form-textarea" rows="5" placeholder="粘贴简历文本"></textarea>
            <div style="margin-top:8px"><button id="analyze-text" class="btn btn-outline">分析文本</button></div>
            <div id="resumes" class="list"></div>
          </div>
        </section>

      </div>

      <!-- ══════ 岗位 ══════ -->
      <section class="panel">
        <div class="panel-header">
          <h2>岗位</h2>
          <span style="font-size:12px;color:var(--text-secondary)" id="job-count">−</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th style="width:42px">分</th><th style="width:80px">状态</th><th>岗位</th><th style="width:120px">公司</th><th>跳过原因</th><th>首句</th></tr></thead>
            <tbody id="jobs"></tbody>
          </table>
        </div>
      </section>

      <!-- ══════ 事件 ══════ -->
      <section class="panel">
        <div class="panel-header"><h2>事件日志</h2></div>
        <div id="events" class="events"></div>
      </section>

    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
